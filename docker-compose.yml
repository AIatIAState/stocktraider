services:
  web:
    image: ghcr.io/aiatiastate/stocktraider/frontend:latest
    build:
      context: ./stockai-web
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - fastapi
  fastapi:
    image: ghcr.io/aiatiastate/stocktraider/fastapi:latest
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    environment:
      - DB_PATH=/data/stocks.db
      - SCHEDULED_UPDATE_ENABLED=true
      - SCHEDULED_UPDATE_TIMEZONE=America/Chicago
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
    volumes:
      - ${DB_DIR:-./data}:/data # fall back to ./data path locally
