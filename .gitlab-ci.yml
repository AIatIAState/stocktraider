stages:
  - test
  - deploy

build_images:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Building Docker images..."
    - docker compose build
    - echo "Test build complete."
  tags:
    - deployment
    - ci

deploy_production:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Cleaning up Docker resources..."
    - docker system prune -af --volumes
    - echo "Checking disk space..."
    - df -h /
    - echo "Linking Database..."
    - cp /home/runner/stocks.db ./data/stocks.db
    - chmod a+rw ./data/stocks.db
    - chown 1000:1000 ./data/stocks.db || true
    - chmod a+rx ./data
    - echo "Preparing SQLite WAL sidecar files..."
    - rm -f ./data/stocks.db-wal ./data/stocks.db-shm || true
    - touch ./data/stocks.db-wal ./data/stocks.db-shm
    - chmod a+rw ./data/stocks.db-wal ./data/stocks.db-shm
    - echo "Deploying to production..."
    - docker compose down --remove-orphans || true
    - docker compose up -d --build --remove-orphans
    - echo "Ensuring SQLite indexes..."
    - docker compose exec -T fastapi python -m db_maintenance --ensure-indexes
    - docker compose ps
    - |
      echo "Smoke check (web -> api readiness)..."
      i=0
      passed=0
      until [ "$i" -ge 30 ]; do
        if docker compose exec -T fastapi python -c "import urllib.request; print(urllib.request.urlopen('http://web:8080/api/ready', timeout=2).read().decode())"; then
          passed=1
          break
        fi
        i=$((i + 1))
        sleep 1
      done
      if [ "$passed" -ne 1 ]; then
        echo "Readiness check failed after 30s"
        docker compose ps
        docker compose logs --no-color --tail=200 fastapi
        docker compose logs --no-color --tail=200 web
        exit 1
      fi
      # Yay
    - echo "Running on coms-4020-002.class.las.iastate.edu:8080"
  tags:
    - deployment
    - cd
