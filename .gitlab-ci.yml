stages:
  - deploy

deploy_production:
  stage: deploy
  only:
    - main
  image: docker:24.0.5 # Includes Docker CLI
  services:
    - docker:24.0.5-dind # Docker-in-Docker service for building containers

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""  # Disable TLS for DinD in CI

  before_script:
    # Ensure SSH is installed
    - apk add --no-cache openssh-client

  script:
    - echo "Starting deployment..."
    # SSH into server using private key directly
    - ssh -i <(echo "$SSH_PRIVATE_KEY") -o StrictHostKeyChecking=no runner@$SERVER_IP << 'EOF'
        echo "Navigating to deploy directory..."
        cd $DEPLOY_PATH

        echo "Pulling latest code..."
        git pull origin main

        echo "Rebuilding container..."
        docker compose down
        docker compose up -d --build

        echo "Deployment complete!"
      EOF
