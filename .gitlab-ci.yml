stages:
  - deploy

deploy_production:
  stage: deploy
  only:
    - main
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""  # Disable TLS for DinD

  before_script:
    - apk add --no-cache openssh-client bash git

  script:
    - echo "Starting deployment..."
    # Write private key to a temp file
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa

    # Optional: add server to known_hosts
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts

    # SSH into server using the temp key file
    - ssh -i ~/.ssh/id_rsa runner@$SERVER_IP << 'EOF'
        echo "Navigating to deploy directory..."
        cd $DEPLOY_PATH

        echo "Pulling latest code..."
        git pull origin main

        echo "Rebuilding container..."
        docker compose down
        docker compose up -d --build

        echo "Deployment complete!"
      EOF
