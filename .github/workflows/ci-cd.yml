name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  test-frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: stockai-web/package-lock.json
      - run: npm ci
        working-directory: stockai-web
      - run: npm run lint
        working-directory: stockai-web
      - run: npm run build
        working-directory: stockai-web

  test-backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: fastapi/requirements-test.txt
      - run: pip install -r fastapi/requirements-test.txt
      - run: pytest fastapi/tests/ -v
        env:
          DB_PATH: /nonexistent/stocks.db

  security-scan:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  docker-build-push:
    name: Build and push Docker images
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase repo name
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Build and push fastapi image
        uses: docker/build-push-action@v6
        with:
          context: ./fastapi
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/fastapi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./stockai-web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/stocktraider
            docker compose pull
            docker compose down --remove-orphans || true
            docker compose up -d --remove-orphans
            docker compose exec -T fastapi python -m db_maintenance --ensure-indexes
            docker compose ps
